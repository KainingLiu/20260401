<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国科学技术大学 - 成绩公示系统</title>
    <style>
        :root {
            --ustc-blue: #004098;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--ustc-blue);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            color: var(--ustc-blue);
            margin-bottom: 10px;
        }
        .message {
            line-height: 1.6;
            margin: 20px 0;
            font-size: 16px;
        }
        .highlight {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.2em;
        }
        .footer {
            font-size: 14px;
            color: #888;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--ustc-blue);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* 简单的动画 */
        @keyframes surprise {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .container {
            animation: surprise 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🎉</div>
    <h1>20260401</h1>
    <div class="message">
        <p><strong>愚人节快乐,尹浩莹同学!</strong></p>
        <p class="highlight">Happy April Fools' Day!</p>
        <p><br><strong>牛津大学的访学项目</strong>记得抽空看一下哦！</p>
    </div>

</div>

</body>
</html>
